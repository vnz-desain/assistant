<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="MEA Assistant V2 — Operator Access Clearance Form.">
  <title>Register Clearance — MEA Assistant V2</title>
  <link rel="stylesheet" href="../login/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="grain" aria-hidden="true"></div>
  <div class="hero-bg" aria-hidden="true"></div>

  <div class="auth-wrapper">
    <div class="auth-container">
      
      <div class="auth-header">
        <a href="../index.html" class="brand-back">← CORE SYSTEM</a>
        <h1 class="brand-title">MEA <span class="outline">CLEARANCE</span></h1>
        <p class="brand-subtitle">REQUEST OPERATOR REGISTRATION</p>
      </div>

      <div id="authNotify" class="auth-notify" style="display: none;"></div>

      <form id="registerForm" class="auth-form" novalidate>
        
        <div class="form-group">
          <label for="fullName">FULL OPERATOR NAME</label>
          <input type="text" id="fullName" placeholder="John Doe" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-group">
          <label for="username">DESIRED USERNAME</label>
          <input type="text" id="username" placeholder="operator_codename" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-group">
          <label for="email">SECURE EMAIL ADDRESS</label>
          <input type="email" id="email" placeholder="name@domain.com" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-group">
          <label for="password">ACCESS PASSWORD (MIN 8 CHARS)</label>
          <input type="password" id="password" placeholder="••••••••" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">CONFIRM SECURE PASSWORD</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-actions">
          <button type="submit" id="btnSubmit" class="btn btn-primary">
            <span class="btn-text">SUBMIT REQUEST</span>
            <span class="spinner" style="display: none;"></span>
          </button>
        </div>

      </form>

      <div class="auth-footer">
        <p>Already have active clearance? <a href="../login/index.html">Authenticate gate</a></p>
      </div>

    </div>
  </div>

  <script src="../assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
  </html>
