<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi Email — MEA Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }

    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
    }
    .icon.loading { background: #1e2d4a; }
    .icon.success { background: #0d2e1a; color: #22c55e; }
    .icon.error   { background: #2e0d0d; color: #ef4444; }
    .icon.pending { background: #2d1e0a; color: #f59e0b; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.6; }

    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #2d3148;
      color: #94a3b8;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon loading" id="icon">
      <div class="spinner"></div>
    </div>
    <h1 id="title">Memverifikasi...</h1>
    <p  id="desc">Mohon tunggu sebentar.</p>
    <div id="actions"></div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
</html>
