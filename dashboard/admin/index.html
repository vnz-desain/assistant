<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Area — MEA Assistant V2</title>
  <link rel="stylesheet" href="../owner/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="grain"></div>
  
  <header class="dash-nav">
    <div class="logo">MEA <span class="accent">ADMINISTRATOR</span></div>
    <div class="user-meta">
      <span id="sessionUser" class="mono">ADMIN@SYSTEM</span>
      <button id="btnLogout" class="btn-logout">TERMINATE</button>
    </div>
  </header>

  <main class="dash-container">
    <section class="table-card">
      <div class="table-header">
        <h2>CLEARANCE APPROVAL MATRIX</h2>
        <button id="btnRefresh" class="btn-action">REFRESH NODE</button>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>OPERATOR NAME</th>
              <th>USERNAME</th>
              <th>EMAIL</th>
              <th>ROLE ASSIGNED</th>
              <th>STATUS</th>
              <th>ACTION DECK</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../../assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
</html>
