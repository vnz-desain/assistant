<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard — MEA Assistant V2</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="grain"></div>
  
  <header class="dash-nav">
    <div class="logo">MEA <span class="accent">OWNER</span></div>
    <div class="user-meta">
      <span id="sessionUser" class="mono">OWNER@SYSTEM</span>
      <button id="btnLogout" class="btn-logout">TERMINATE SESSION</button>
    </div>
  </header>

  <main class="dash-container">
    <section class="overview-grid">
      <div class="stat-box">
        <div class="label">TOTAL LOGGED OPERATORS</div>
        <div class="value" id="countTotal">-</div>
      </div>
      <div class="stat-box alert">
        <div class="label">PENDING AUTH CLEARANCE</div>
        <div class="value" id="countPending">-</div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2>CENTRAL DATABASE CONTROL LAYER</h2>
        <button id="btnRefresh" class="btn-action">REFRESH NETWORK</button>
      </div>
      
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>FULL NAME</th>
              <th>USERNAME</th>
              <th>EMAIL</th>
              <th>ROLE</th>
              <th>STATUS</th>
              <th>MODERATION ACTIONS</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td colspan="7" class="loading-state">Querying database cloud sync layers...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../../assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
</html>
