<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OAuth Center — MEA Assistant</title>

  <!-- depth 2: account/oauth/ → ../../ -->
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main" id="main">

    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open navigation">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-left">
        <div class="page-breadcrumb">
          <span class="breadcrumb-parent">Account Center</span>
          <i data-lucide="chevron-right"></i>
          <span class="breadcrumb-current">OAuth Center</span>
        </div>
        <h1 class="greeting">OAuth Center</h1>
        <p class="date-line">Manage authorization, connected services, access tokens and security integrations.</p>
      </div>
      <div class="topbar-right">
        <div class="live-clock" id="liveClock"></div>
        <button class="icon-btn" id="btn-refresh-header" aria-label="Refresh">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
      </div>
    </header>

    <div class="content">

      <!-- Summary Cards -->
      <section aria-label="Summary">
        <div class="oc-stats-grid" id="summary-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Quick Actions -->
      <section aria-label="Quick Actions">
        <div class="gc-actions-bar" id="actions-bar">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Connected Services -->
      <section aria-label="Connected Services">
        <div class="section-header-row">
          <h2 class="section-title">
            <i data-lucide="plug"></i> Connected Services
          </h2>
          <button class="btn btn-ghost btn-sm" id="btn-add-service">
            <i data-lucide="plus"></i> Add Service
          </button>
        </div>
        <div class="oc-services-grid" id="services-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Row: Token Management + Security Overview -->
      <div class="row-2">

        <div class="card" aria-label="Token Management">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="key"></i> Token Management
            </h2>
            <span class="badge-pill badge-pill--blue" id="token-active-count">3 Active</span>
          </div>
          <div class="oc-token-list" id="token-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="Security Overview">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="shield-check"></i> Security Overview
            </h2>
          </div>
          <div class="oc-security-body" id="security-body">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

      <!-- Row: Permissions Center + Security Alerts -->
      <div class="row-2">

        <div class="card" aria-label="Permissions Center">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="lock"></i> Permissions Center
            </h2>
            <button class="btn btn-ghost btn-sm" id="btn-view-all-perms">View All</button>
          </div>
          <div class="oc-perm-list" id="perm-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="Security Alerts">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="alert-triangle"></i> Security Alerts
            </h2>
            <span class="badge-pill badge-pill--red" id="alerts-count">4 Alerts</span>
          </div>
          <div class="oc-alerts-list" id="alerts-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

      <!-- Row: Activity Timeline + Integration Status -->
      <div class="row-2">

        <div class="card" aria-label="Recent Activity">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="activity"></i> Activity Timeline
            </h2>
            <button class="btn btn-ghost btn-sm" id="btn-view-all-activity">View All</button>
          </div>
          <div class="gc-timeline" id="activity-timeline">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="Integration Status">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="zap"></i> Integration Status
            </h2>
          </div>
          <div class="gc-sync-list" id="integration-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

    </div><!-- /content -->
  </main>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="script.js"></script>
</body>
</html>
