<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs Center — MEA Assistant</title>

  <!-- depth 2: account/logs/ → ../../ -->
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main" id="main">

    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open navigation">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-left">
        <div class="page-breadcrumb">
          <span class="breadcrumb-parent">Account Center</span>
          <i data-lucide="chevron-right"></i>
          <span class="breadcrumb-current">Logs Center</span>
        </div>
        <h1 class="greeting">Logs Center</h1>
        <p class="date-line">Monitor system activity, events, integrations and security logs across MEA Assistant.</p>
      </div>
      <div class="topbar-right">
        <div class="live-clock" id="liveClock"></div>
        <button class="icon-btn" id="btn-refresh-header" aria-label="Refresh">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
      </div>
    </header>

    <div class="content">

      <!-- Summary Cards -->
      <section aria-label="Summary">
        <div class="lc-stats-grid" id="summary-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Quick Actions -->
      <section aria-label="Quick Actions">
        <div class="gc-actions-bar" id="actions-bar">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Event Overview -->
      <section aria-label="Event Overview">
        <div class="section-header-row">
          <h2 class="section-title">
            <i data-lucide="bar-chart-2"></i> Event Overview
          </h2>
          <button class="btn btn-ghost btn-sm" id="btn-view-all-events">View All</button>
        </div>
        <div class="lc-events-grid" id="events-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Row: Log Filters + System Health -->
      <div class="row-2">

        <div class="card" aria-label="Log Filters">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="filter"></i> Log Filters
            </h2>
            <button class="btn btn-ghost btn-sm" id="btn-clear-filters">Clear</button>
          </div>
          <div class="lc-filter-list" id="filter-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="System Health">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="heart-pulse"></i> System Health
            </h2>
            <span class="badge-pill badge-pill--blue" id="health-status-badge">All Systems</span>
          </div>
          <div class="gc-sync-list" id="health-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

      <!-- Recent Activity Logs -->
      <section aria-label="Recent Activity Logs">
        <div class="section-header-row">
          <h2 class="section-title">
            <i data-lucide="activity"></i> Recent Activity Logs
          </h2>
          <button class="btn btn-ghost btn-sm" id="btn-view-all-activity">View All</button>
        </div>
        <div class="card lc-activity-card">
          <div class="lc-activity-list" id="activity-list">
            <!-- Rendered by script.js -->
          </div>
        </div>
      </section>

      <!-- Row: Security Events + API Activity -->
      <div class="row-2">

        <div class="card" aria-label="Security Events">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="shield-alert"></i> Security Events
            </h2>
            <span class="badge-pill badge-pill--red" id="security-count">5 Events</span>
          </div>
          <div class="lc-security-list" id="security-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="API Activity">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="zap"></i> API Activity
            </h2>
          </div>
          <div class="lc-api-body" id="api-body">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

      <!-- Top Active Modules -->
      <section aria-label="Top Active Modules">
        <div class="section-header-row">
          <h2 class="section-title">
            <i data-lucide="trending-up"></i> Top Active Modules
          </h2>
        </div>
        <div class="card">
          <div class="lc-modules-list" id="modules-list">
            <!-- Rendered by script.js -->
          </div>
        </div>
      </section>

    </div><!-- /content -->
  </main>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="script.js"></script>
</body>
</html>
