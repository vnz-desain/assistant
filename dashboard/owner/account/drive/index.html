<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Center — MEA Assistant</title>

  <!-- depth 2: account/drive/ → ../../ -->
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Lucide — WAJIB ada di setiap halaman -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- Wajib: drawer overlay untuk mobile -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- Wajib: sidebar shell — diisi otomatis oleh sidebar.js -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <main class="main" id="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open navigation">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-left">
        <div class="page-breadcrumb">
          <span class="breadcrumb-parent">Account Center</span>
          <i data-lucide="chevron-right"></i>
          <span class="breadcrumb-current">Drive Center</span>
        </div>
        <h1 class="greeting">Drive Center</h1>
        <p class="date-line">Manage connected Google Drive accounts, storage, synchronization and automation.</p>
      </div>
      <div class="topbar-right">
        <div class="live-clock" id="liveClock"></div>
        <button class="icon-btn" id="btn-refresh-header" aria-label="Refresh">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <div class="content">

      <!-- Summary Cards -->
      <section aria-label="Summary">
        <div class="stats-grid" id="summary-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Quick Actions -->
      <section aria-label="Quick Actions">
        <div class="gc-actions-bar" id="actions-bar">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Connected Drives -->
      <section aria-label="Connected Drives">
        <div class="section-header-row">
          <h2 class="section-title">
            <i data-lucide="hard-drive"></i> Connected Drives
          </h2>
          <button class="btn btn-ghost btn-sm" id="btn-add-drive">
            <i data-lucide="plus"></i> Add Drive
          </button>
        </div>
        <div class="gc-accounts-grid" id="drives-grid">
          <!-- Rendered by script.js -->
        </div>
      </section>

      <!-- Row: Storage Overview (full width) -->
      <section aria-label="Storage Overview">
        <div class="card" id="storage-overview-card">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="database"></i> Storage Overview
            </h2>
            <span class="badge-pill badge-pill--blue">2.4 TB Total</span>
          </div>
          <div id="storage-overview-body">
            <!-- Rendered by script.js -->
          </div>
        </div>
      </section>

      <!-- Row: Automation + Sync Status -->
      <div class="row-2">

        <div class="card" aria-label="Automation Center">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="settings-2"></i> Drive Automation
            </h2>
            <span class="badge-pill badge-pill--blue" id="auto-active-count">3 Active</span>
          </div>
          <div class="gc-toggle-list" id="automation-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="Sync Status">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="refresh-cw"></i> Synchronization Status
            </h2>
          </div>
          <div class="gc-sync-list" id="sync-list">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

      <!-- Row: Activity + Top Storage Users -->
      <div class="row-2">

        <div class="card" aria-label="Recent Activity">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="activity"></i> Activity Timeline
            </h2>
            <button class="btn btn-ghost btn-sm" id="btn-view-all-activity">View All</button>
          </div>
          <div class="gc-timeline" id="activity-timeline">
            <!-- Rendered by script.js -->
          </div>
        </div>

        <div class="card" aria-label="Top Storage Users">
          <div class="card-header">
            <h2 class="card-title">
              <i data-lucide="bar-chart-2"></i> Top Storage Users
            </h2>
          </div>
          <div id="top-users-body">
            <!-- Rendered by script.js -->
          </div>
        </div>

      </div>

    </div><!-- /content -->
  </main>

  <!-- Scripts — depth 2: ../../ -->
  <script src="../../assets/js/sidebar.js"></script>
  <script src="script.js"></script>
</body>
</html>
