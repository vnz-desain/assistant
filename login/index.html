<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="Login — MEA Assistant V2">
  <title>Login — MEA Assistant</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Film grain -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Background -->
  <div class="auth-bg" aria-hidden="true"></div>

  <!-- ─── LOGIN CARD ─── -->
  <main class="auth-wrap" id="authWrap">

    <div class="auth-card" role="main">

      <!-- Logo -->
      <a href="/" class="auth-logo" aria-label="MEA Assistant Home">MEA</a>
      <p class="auth-sub">ASSISTANT V2</p>

      <h1 class="auth-title">ACCESS<br><span class="outline">PLATFORM</span></h1>

      <!-- Alert -->
      <div class="auth-alert" id="alertBox" role="alert" aria-live="polite" hidden></div>

      <!-- Form -->
      <div class="auth-form" id="loginForm" novalidate>

        <div class="field-group">
          <label class="field-label" for="identifier">USERNAME / EMAIL</label>
          <input
            class="field-input"
            type="text"
            id="identifier"
            name="identifier"
            autocomplete="username"
            placeholder="username atau email"
            required
          >
          <span class="field-error" id="identifierErr"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">PASSWORD</label>
          <div class="input-wrap">
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            >
            <button class="toggle-pw" type="button" aria-label="Toggle password visibility" id="togglePw">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordErr"></span>
        </div>

        <button class="btn-submit" type="button" id="loginBtn">
          <span class="btn-text">MASUK</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>

      </div>

      <p class="auth-switch">
        Belum punya akun?
        <a href="../register/" class="auth-link">Daftar sekarang</a>
      </p>

    </div>

    <!-- Decorative line -->
    <div class="auth-deco" aria-hidden="true">
      <span class="deco-line"></span>
      <span class="deco-label">MEA ECOSYSTEM</span>
      <span class="deco-line"></span>
    </div>

  </main>

  <script src="../assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
</html>
