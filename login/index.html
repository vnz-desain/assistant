<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="MEA Assistant V2 — Platform Authentication Gate.">
  <title>Login — MEA Assistant V2</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div class="grain" aria-hidden="true"></div>

  <div class="hero-bg" aria-hidden="true"></div>

  <div class="auth-wrapper">
    <div class="auth-container">
      
      <div class="auth-header">
        <a href="../index.html" class="brand-back">← CORE SYSTEM</a>
        <h1 class="brand-title">MEA <span class="outline">AUTH</span></h1>
        <p class="brand-subtitle">ENTER THE MEA ASSISTANT PLATFORM</p>
      </div>

      <div id="authNotify" class="auth-notify" style="display: none;"></div>

      <form id="loginForm" class="auth-form" novalidate>
        
        <div class="form-group">
          <label for="identity">USERNAME OR EMAIL</label>
          <input type="text" id="identity" autocomplete="username" placeholder="Enter credentials..." required>
          <span class="input-bar"></span>
        </div>

        <div class="form-group">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
          <span class="input-bar"></span>
        </div>

        <div class="form-actions">
          <button type="submit" id="btnSubmit" class="btn btn-primary">
            <span class="btn-text">INITIALIZE ACCESS</span>
            <span class="spinner" style="display: none;"></span>
          </button>
        </div>

      </form>

      <div class="auth-footer">
        <p>New operator? <a href="../register/index.html">Request access clearance</a></p>
      </div>

    </div>
  </div>

  <script src="../assets/theme/config.js"></script>
  <script src="script.js"></script>
</body>
      </html>
