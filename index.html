<!DOCTYPE html>
<html lang="en">
<head>

  <!--
    MEA ASSISTANT V2
    ─────────────────────────────────────────
    Semua konten dirender oleh JS dari config/theme.js.
    File ini hanya shell HTML + slot elemen.

    Load order:
      1. css/style.css      — render-critical styling
      2. Google Fonts       — typography
      3. config/theme.js    — SITE config object
      4. js/script.js       — build DOM + behavior
  -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="MEA Assistant — Business AI, Trading AI, Developer AI. Built for the MEA Ecosystem.">

  <title>MEA Assistant V2</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">

  <!-- Preload hero image hint -->
  <link rel="preload" as="image" href="images/hero-bg.webp">

</head>
<body>

  <!-- Film grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ─── HERO BACKGROUND ─── -->
  <div class="hero-bg" aria-hidden="true">
    <!-- src injected by JS from SITE.assets.heroBg -->
    <img class="hero-bg-img" alt="" fetchpriority="high" decoding="async">
  </div>

  <!-- ─── NAVBAR ─── -->
  <!-- Content built by buildNav() in script.js -->
  <nav class="nav" id="nav" role="navigation" aria-label="Main navigation"></nav>

  <!-- ─── HERO ─── -->
  <section class="hero" id="hero">
    <span class="hero-tag">MEA ECOSYSTEM PLATFORM</span>

    <h1>
      MEA
      <span class="outline">ASSISTANT</span>
    </h1>

    <p class="hero-desc">
      Business Assistant. AI Trading. AI Developer.
      Built for the MEA Ecosystem.
    </p>

    <div class="hero-btns">
      <a href="login.html"  class="btn btn-primary">ACCESS PLATFORM</a>
      <a href="#platform"   class="btn btn-secondary">EXPLORE</a>
    </div>

    <!-- Scroll cue -->
    <div class="scroll-cue" aria-hidden="true">
      <span class="scroll-line"></span>
      <span class="scroll-label">SCROLL</span>
    </div>
  </section>

  <!-- ─── PLATFORM ─── -->
  <section id="platform" class="platform">
    <div class="container">

      <div class="section-head reveal">
        <p class="section-label">PLATFORM MODULES</p>
        <h2 class="section-title">Choose Your Assistant</h2>
      </div>

      <!-- Cards injected by buildPlatform() -->
      <div class="cards" id="cards"></div>

    </div>
  </section>

  <!-- ─── STATUS ─── -->
  <section id="status" class="status">
    <div class="container" style="width:100%">
      <!-- Status cards injected by buildStatus() -->
      <div class="status" id="statusWrap" style="padding:0"></div>
    </div>
  </section>

  <!-- ─── CTA ─── -->
  <section class="cta">
    <div class="container">
      <!-- Content injected by buildCTA() -->
      <div class="cta-inner reveal" id="ctaInner"></div>
    </div>
  </section>

  <!-- ─── FOOTER ─── -->
  <!-- Content injected by buildFooter() -->
  <footer id="footer"></footer>

  <!-- Scripts — config MUST be before script.js -->
  <script src="config/theme.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
